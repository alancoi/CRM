<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Chats Reales</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #075e54; color: white; overflow-y: auto; padding: 20px; }
    .chat-item { padding: 10px; margin: 5px 0; background: rgba(255,255,255,0.1); cursor: pointer; border-radius: 5px; }
    .chat-item:hover { background: rgba(255,255,255,0.2); }
    .main { flex: 1; padding: 20px; }
    .messages { background: white; padding: 20px; border-radius: 5px; min-height: 300px; }
    .message { padding: 10px; margin: 5px 0; background: #f0f0f0; border-radius: 5px; }
    .message.sent { background: #dcf8c6; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar" id="chats"></div>
    <div class="main">
      <h2>Selecciona un chat</h2>
      <div class="messages" id="messages"></div>
    </div>
  </div>

  <script>
    let allChats = [];
    let selectedChat = null;

    async function loadChats() {
      try {
        const response = await fetch('/api/dashboard-data');
        const data = await response.json();
        allChats = data.chats || [];
        renderChats();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('chats').innerHTML = '<p style="color:red;">Error cargando chats</p>';
      }
    }

    function renderChats() {
      const container = document.getElementById('chats');
      if (allChats.length === 0) {
        container.innerHTML = '<p>Sin chats aún</p>';
        return;
      }
      container.innerHTML = allChats.map(chat => `
        <div class="chat-item" onclick="selectChat(${chat.id})">
          <strong>${chat.name}</strong><br>
          <small>${chat.lastMessage.substring(0, 30)}...</small>
        </div>
      `).join('');
    }

    function selectChat(id) {
      selectedChat = allChats.find(c => c.id === id);
      if (!selectedChat) return;
      
      const messagesDiv = document.getElementById('messages');
      messagesDiv.innerHTML = `<h3>${selectedChat.name}</h3>` + 
        (selectedChat.messages || []).map(msg => `
          <div class="message ${msg.type}">
            ${msg.text}
          </div>
        `).join('');
    }

    loadChats();
  </script>
</body>
</html>
